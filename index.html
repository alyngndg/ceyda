<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Trebuchet MS', sans-serif;
}

body{
    background:#f8d7da;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Uçuşan kalpler */
.heart{
    position:absolute;
    font-size:22px;
    animation:float linear infinite;
    opacity:0.8;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

.center{
    text-align:center;
    z-index:10;
}

.button{
    margin-top:15px;
    background:white;
    color:#ff5c8a;
    border:none;
    padding:15px 25px;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:0.3s;
}

.button:hover{
    transform:scale(1.05);
}

.message-box{
    display:none;
    background:rgba(255,255,255,0.9);
    padding:25px;
    border-radius:20px;
    max-width:600px;
    margin:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    color:#444;
    animation:pop .5s ease;
}

@keyframes pop{
    from{
        transform:scale(0.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.small-note{
    position:fixed;
    bottom:15px;
    width:100%;
    text-align:center;
    color:#a14f6b;
    font-size:14px;
    font-style:italic;
    padding:0 15px;
}

h1{
    color:#ff5c8a;
}

.main-text{
    font-size:20px;
    color:#c24d74;
}
</style>
</head>
<body>

<div class="center" id="start">
    <h1>Sana bir mesajım var 💗</h1>
    <button class="button" onclick="showMessage()">
        (Tıklaaaa)
    </button>
</div>

<div class="message-box" id="messageBox">
    <p style="margin-bottom:20px;">
        buraya Luciferı koycaktım ama kod yazmada o kdr gelişemedim daga özrdlrm 😭
    </p>

    <p class="main-text">
        Calculus ha! Calculus mu çalışıyosun. Çok kolay.
        Yapabilirsin. Sana güveniyorum 💗
    </p>
</div>

<div class="small-note">
    iyi ki varsınn seni çok seviyorum umarım hoşuna gitmiştir😭
    calculus gerçek değil bu arada btw <br><br>
    -Aleyna
</div>

<script>
function showMessage(){
    document.getElementById("start").style.display="none";
    document.getElementById("messageBox").style.display="block";
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💗";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (4 + Math.random()*6) + "s";
    heart.style.fontSize = (15 + Math.random()*20) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
